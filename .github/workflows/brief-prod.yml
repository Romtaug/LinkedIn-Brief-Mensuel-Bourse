name: 📊 Brief Mensuel Bourse · PROD

# ─────────────────────────────────────────────────────────────────
# MODE PROD : tourne automatiquement le 1er jour ouvré de chaque mois
# Le script Python vérifie en interne si on doit poster aujourd'hui
# Configuration : TEST_MODE=false (1370 tickers), FORCE_RUN=false
# ─────────────────────────────────────────────────────────────────

on:
  schedule:
    # Tous les jours du 1 au 4 du mois à 7h UTC (= 8h-9h Paris selon saison)
    # Le script Python vérifie en interne si on doit RUN aujourd'hui
    - cron: '0 7 1-4 * *'

  # Lancement manuel depuis l'interface GitHub Actions
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'TEST_MODE (true = 40 actions, false = 1370 actions)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      send_to_webhook:
        description: 'Envoyer au webhook Make.com (publier sur LinkedIn) ?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      force_run:
        description: 'Forcer le run (bypass check premier jour ouvré)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 🎬 Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Run Brief Mensuel (PROD)
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          CODE_PARRAINAGE: ${{ secrets.CODE_PARRAINAGE }}
          PARRAINAGE_URL: ${{ secrets.PARRAINAGE_URL }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          SEND_TO_WEBHOOK: ${{ github.event.inputs.send_to_webhook || 'true' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: python brief_mensuel.py

      - name: 📸 Commit snapshots
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add snapshots/ || true
          if git diff --staged --quiet; then
            echo "ℹ️  Pas de changements snapshots"
          else
            git commit -m "📸 Snapshot mensuel + rotation [skip ci]"
            git push
          fi

      - name: 📤 Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-prod-${{ github.run_number }}
          path: |
            out/*.mp4
            out/*.txt
            out/*.xlsx
          retention-days: 30
          if-no-files-found: warn
