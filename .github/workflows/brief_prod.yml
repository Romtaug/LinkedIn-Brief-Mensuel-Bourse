# ═══════════════════════════════════════════════════════════════════════
#  Brief Mensuel Equity — Workflow PROD
#  ──────────────────────────────────────────────────────────────────────
#  Cron : tous les 1-4 du mois à 7h UTC (9h Paris CEST / 8h Paris CET).
#  Le script vérifie en interne s'il s'agit du premier jour ouvré du mois
#  → si non, exit 0 propre. Cela permet d'avoir un filet de sécurité
#  en cas de runner indisponible le jour J.
#
#  Univers complet (~1480 tickers : SP500 + STOXX + DAX + MDAX + SBF120 mid
#  + WIG20 + ASE + Nikkei + TSX60 + ASX50 + HSI).
#
#  Durée typique : 20-30 minutes (fetch + encodage vidéo placebo).
# ═══════════════════════════════════════════════════════════════════════
name: "🚀 Brief Mensuel — PROD"

on:
  schedule:
    # Tous les 1, 2, 3, 4 du mois à 7h UTC (laisse 4 tentatives au check
    # "premier jour ouvré" intégré au script — bypass propre si déjà run).
    - cron: "0 7 1-4 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forcer le run même si pas le 1er jour ouvré"
        type: choice
        required: true
        default: "false"
        options:
          - "false"
          - "true"

jobs:
  brief-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # Marge confortable pour fetch + encodage placebo

    concurrency:
      group: brief-mensuel-prod
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install ffmpeg (system)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests-cache openpyxl tqdm requests pillow playwright imageio-ffmpeg

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run brief (FULL UNIVERSE)
        env:
          TEST_MODE: "false"
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          SEND_TO_WEBHOOK: "true"
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          CODE_PARRAINAGE: ${{ secrets.CODE_PARRAINAGE }}
          PARRAINAGE_URL: ${{ secrets.PARRAINAGE_URL }}
        run: |
          echo "🚀 Lancement du brief en mode PROD (univers complet)"
          python brief_mensuel.py

      - name: Upload artifacts (xlsx + post + video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-prod-outputs-${{ github.run_number }}
          path: |
            out/
            snapshots/
          retention-days: 30

      - name: Commit snapshots (mensuels)
        if: success()
        run: |
          git config user.name  "Brief Bot"
          git config user.email "bot@thermodata.fr"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "ℹ️ Aucun snapshot à committer"
            exit 0
          fi
          git commit -m "🚀 Snapshot PROD $(date -u +%Y-%m-%d) [skip ci]"
          # Retry push robuste anti-conflit
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "✅ Push réussi (tentative $i)"
              exit 0
            fi
            echo "⚠️ Push rejeté (tentative $i), rebase puis retry..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((RANDOM % 15 + 5))
          done
          echo "❌ Push échoué après 5 tentatives"
          exit 1
