# ═══════════════════════════════════════════════════════════════════════
#  Brief Mensuel Equity — Workflow PROD
#  ──────────────────────────────────────────────────────────────────────
#  Cron : tous les 1-7 du mois à 6h UTC (= 8h Paris CEST / 7h Paris CET).
#  Le script vérifie en interne s'il s'agit du premier jour ouvré
#  NON FÉRIÉ du mois → si non, exit 0 propre. Range 1-7 pour couvrir
#  les pires cas (ex : 1er janvier vendredi férié + weekend → 4 janvier).
#
#  Une fois le pipeline data + vidéo terminé, le script SLEEP jusqu'à
#  09:00 Paris pile (gestion DST automatique via zoneinfo Europe/Paris)
#  avant d'envoyer le webhook Make.com → publication LinkedIn dans
#  le créneau optimal B2B (pic d'engagement 9h-11h).
#
#  Univers complet (~1480 tickers : SP500 + STOXX + DAX + MDAX + SBF120 mid
#  + WIG20 + ASE + Nikkei + TSX60 + ASX50 + HSI).
#
#  Durée typique : 20-30 min fetch/encodage + 30-90 min sleep = 1h-2h.
#
#  🆕 En fin de pipeline : publication d'une GitHub Release "latest" avec
#     ranking_latest.xlsx → consommé par la web app Streamlit
#     (https://brief-mensuel-bourse.streamlit.app).
# ═══════════════════════════════════════════════════════════════════════
name: "🚀 Brief Mensuel — PROD"

on:
  schedule:
    # Tous les 1-7 du mois à 6h UTC. Le script filtre en interne sur
    # le premier jour ouvré non férié + sleep jusqu'à 09:00 Paris.
    - cron: "0 6 1-7 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Forcer le run même si pas le 1er jour ouvré (bypass sleep aussi)"
        type: choice
        required: true
        default: "false"
        options:
          - "false"
          - "true"
      test_mode:
        description: "Mode TEST (fetch limité au lieu de l'univers complet)"
        type: choice
        required: true
        default: "false"
        options:
          - "false"
          - "true"
      n_tickers_test:
        description: "Nombre de tickers en mode TEST (défaut 50)"
        type: string
        required: false
        default: "50"
      send_webhook:
        description: "Publier sur LinkedIn via webhook Make.com (false = test app sans poster)"
        type: choice
        required: true
        default: "true"
        options:
          - "true"
          - "false"

jobs:
  brief-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3h : 30 min fetch + jusqu'à 2h sleep + marge

    concurrency:
      group: brief-mensuel-prod
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-v1

      - name: Install ffmpeg (system)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests-cache openpyxl tqdm requests pillow playwright imageio-ffmpeg

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run brief
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          N_TICKERS_TEST: ${{ github.event.inputs.n_tickers_test || '50' }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          SEND_TO_WEBHOOK: ${{ github.event.inputs.send_webhook || 'true' }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          CODE_PARRAINAGE: ${{ secrets.CODE_PARRAINAGE }}
          PARRAINAGE_URL: ${{ secrets.PARRAINAGE_URL }}
        run: |
          echo "🚀 Lancement du brief en mode PROD (univers complet)"
          python brief_mensuel.py

      - name: Upload artifacts (xlsx + post + video)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-prod-outputs-${{ github.run_number }}
          path: |
            out/
            snapshots/
          retention-days: 30

      # ═══════════════════════════════════════════════════════════════════
      # 🆕 RELEASE GITHUB pour la web app Streamlit
      # ───────────────────────────────────────────────────────────────────
      # On copie l'xlsx daté (ranking_YYYY-MM-DD.xlsx) vers un nom FIXE
      # (ranking_latest.xlsx) que la web app Streamlit peut cibler via une
      # URL stable : releases/latest/download/ranking_latest.xlsx
      #
      # ⚠️ Skip en mode TEST (on ne veut pas écraser la release prod avec des
      #    données de test à 50 tickers).
      # ═══════════════════════════════════════════════════════════════════
      - name: Prepare xlsx for Streamlit app
        if: success() && (github.event.inputs.test_mode || 'false') != 'true'
        run: |
          # En prod, l'xlsx n'a pas de suffixe _test → on cible ranking_2026-XX-XX.xlsx
          # (on exclut explicitement les éventuels *_test.xlsx par sécurité)
          XLSX=$(ls out/ranking_*.xlsx 2>/dev/null | grep -v "_test" | head -1)
          if [ -z "$XLSX" ]; then
            echo "⚠️ Aucun xlsx prod trouvé (probablement jour non publiable) → skip release"
            echo "skip_release=true" >> $GITHUB_ENV
          else
            cp "$XLSX" out/ranking_latest.xlsx
            echo "✅ Copié $XLSX → out/ranking_latest.xlsx"
            ls -lh out/ranking_latest.xlsx
            echo "skip_release=false" >> $GITHUB_ENV
          fi

      - name: Publish GitHub Release (latest)
        if: success() && env.skip_release != 'true' && (github.event.inputs.test_mode || 'false') != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Brief Mensuel — Dernier classement"
          files: out/ranking_latest.xlsx
          body: |
            ## 📊 Brief Mensuel Bourse — Classement complet

            Mise à jour automatique du dernier brief mensuel.

            🌐 **Web app filtrable** : https://brief-mensuel-bourse.streamlit.app
            📦 **Code source** : https://github.com/${{ github.repository }}
            💼 **Post LinkedIn** : https://www.linkedin.com/in/romain-taugourdeau/recent-activity/all/

            Filtres dispo dans l'app : PEA/CTO, secteur GICS, pays, sliders potentiel/perf, couverture analystes.

            ⚠️ Risque de perte en capital. Ceci n'est pas un conseil en investissement.
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ═══════════════════════════════════════════════════════════════════
      # FIN du bloc Release GitHub
      # ═══════════════════════════════════════════════════════════════════

      - name: Commit snapshots (mensuels)
        if: success()
        run: |
          git config user.name  "Brief Bot"
          git config user.email "bot@thermodata.fr"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "ℹ️ Aucun snapshot à committer"
            exit 0
          fi
          git commit -m "🚀 Snapshot PROD $(date -u +%Y-%m-%d) [skip ci]"
          # Retry push robuste anti-conflit
          for i in 1 2 3 4 5; do
            if git push origin main; then
              echo "✅ Push réussi (tentative $i)"
              exit 0
            fi
            echo "⚠️ Push rejeté (tentative $i), rebase puis retry..."
            git pull --rebase --autostash origin main || exit 1
            sleep $((RANDOM % 15 + 5))
          done
          echo "❌ Push échoué après 5 tentatives"
          exit 1
